version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Use an exact connection string pointing to a path that is a docker volume
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/moneytrace.db
    volumes:
      - moneytrace-data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  moneytrace-data:
